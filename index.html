<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чистая Голова</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F7F3EF; margin: 0; }
        .olive-gradient { background: linear-gradient(135deg, #708238 0%, #4F6F52 100%); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .app-container { width: 100%; max-width: 410px; height: 100vh; margin: 0 auto; position: relative; display: flex; flex-direction: column; background: #F7F3EF; }
        @media (min-width: 450px) { .app-container { height: 800px; border-radius: 3rem; border: 10px solid #3A4D39; margin-top: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [page, setPage] = useState('home');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('mom_tasks') || '[]'));

            useEffect(() => {
                localStorage.setItem('mom_tasks', JSON.stringify(history));
            }, [history]);

            const handleAnalyze = () => {
                if (!input.trim()) return;
                setLoading(true);
                setTimeout(() => {
                    const result = "🚨 СРОЧНО:\n- Купить продукты\n\n🧸 ДЕТИ:\n- Записать в кружок\n\n🏠 БЫТ:\n- Стирка\n\n🌿 ВСЁ ПОЛУЧИТСЯ!";
                    setHistory([{ id: Date.now(), input, output: result }, ...history]);
                    setInput('');
                    setLoading(false);
                    setPage('history');
                }, 1500);
            };

            return (
                <div className="app-container overflow-hidden">
                    <div className="flex-1 overflow-y-auto p-6 pb-24">
                        {page === 'home' && (
                            <div className="flex flex-col items-center text-center space-y-10 pt-16">
                                <div className="w-24 h-24 olive-gradient rounded-[2.5rem] flex items-center justify-center text-4xl shadow-xl">🌿</div>
                                <h1 className="text-4xl font-black text-[#3A4D39] uppercase">ЧИСТАЯ<br/>ГОЛОВА</h1>
                                <button onClick={() => setPage('input')} className="w-full py-5 olive-gradient text-white rounded-2xl font-bold shadow-lg">НАЧАТЬ</button>
                            </div>
                        )}
                        {page === 'input' && (
                            <div className="space-y-6 pt-6">
                                <h2 className="text-2xl font-black text-[#3A4D39]">Что в голове?</h2>
                                <textarea className="w-full h-64 p-6 rounded-3xl glass outline-none text-[#3A4D39] font-medium resize-none shadow-inner" placeholder="Пиши всё подряд..." value={input} onChange={(e) => setInput(e.target.value)} />
                                <button onClick={handleAnalyze} className="w-full py-5 olive-gradient text-white rounded-2xl font-bold shadow-xl">РАЗОБРАТЬ</button>
                            </div>
                        )}
                        {page === 'history' && (
                            <div className="space-y-6 pt-6">
                                <h2 className="text-2xl font-black text-[#3A4D39]">Твой порядок</h2>
                                {history.map(item => (
                                    <div key={item.id} className="p-6 rounded-3xl glass border-l-8 border-[#708238] mb-4">
                                        <p className="text-[10px] font-bold opacity-40 uppercase italic mb-2">"{item.input}"</p>
                                        <div className="text-xs leading-relaxed text-[#3A4D39] whitespace-pre-wrap">{item.output}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    {loading && <div className="absolute inset-0 z-50 glass flex items-center justify-center font-bold text-[#3A4D39]">Думаем...</div>}
                    <div className="absolute bottom-6 left-6 right-6 h-20 glass rounded-[2rem] flex items-center justify-around px-4 shadow-xl border border-white/50">
                        <button onClick={() => setPage('home')} className={`p-4 rounded-xl ${page==='home'?'olive-gradient text-white':'text-[#3A4D39]/30'}`}>🏠</button>
                        <button onClick={() => setPage('input')} className={`p-4 rounded-xl ${page==='input'?'olive-gradient text-white':'text-[#3A4D39]/30'}`}>📝</button>
                        <button onClick={() => setPage('history')} className={`p-4 rounded-xl ${page==='history'?'olive-gradient text-white':'text-[#3A4D39]/30'}`}>📋</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
