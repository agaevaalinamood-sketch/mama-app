<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чистая Голова | Планировщик</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --olive: #5F6F52;
            --cream: #FEFAE0;
            --earth: #B99470;
            --sage: #A9B388;
        }
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #fcfbf4; 
            color: #2c3327;
            -webkit-tap-highlight-color: transparent;
        }
        .app-shell {
            max-width: 430px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fcfbf4;
            position: relative;
        }
        .olive-grad { background: linear-gradient(135deg, #5F6F52 0%, #3E4B34 100%); }
        .card-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
        }
        .nav-blur {
            background: rgba(252, 251, 244, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(95, 111, 82, 0.1);
        }
        .animate-in { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #5F6F52; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('mom_tasks_v2') || '[]'));
            const [planType, setPlanType] = useState('day'); 
            const [apiKey, setApiKey] = useState("");

            useEffect(() => {
                localStorage.setItem('mom_tasks_v2', JSON.stringify(tasks));
            }, [tasks]);

            const askAI = async (promptText) => {
                setLoading(true);
                const KEY = ""; // Ключ подставляется средой
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Ты экспертный планировщик для мам. Преврати этот хаотичный текст в структурированный проект. 1. Раздели по категориям (Срочно, Быт, Дети, Личное). 2. Создай пошаговый план реализации с примерным временем. 3. Добавь теплое мотивирующее пожелание. Текст: ${promptText}` }] }]
                        })
                    });
                    const data = await response.json();
                    setLoading(false);
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Не удалось разобрать задачи.";
                } catch (err) {
                    setLoading(false);
                    return "Ошибка связи с ИИ. Попробуйте позже.";
                }
            };

            const handleProcess = async () => {
                if(!input.trim()) return;
                const result = await askAI(input);
                setTasks([{
                    id: Date.now(),
                    raw: input,
                    analysis: result,
                    date: new Date().toLocaleDateString('ru-RU'),
                    isProject: true
                }, ...tasks]);
                setInput('');
                setView('history');
            };

            const NavButton = ({id, icon, label}) => (
                <button 
                    onClick={() => setView(id)}
                    className={`flex flex-col items-center space-y-1 transition-all ${view === id ? 'text-[#5F6F52]' : 'text-gray-400'}`}
                >
                    <div className={`p-2 rounded-2xl ${view === id ? 'bg-[#5F6F52]/10' : ''}`}>
                        {icon}
                    </div>
                    <span className="text-[10px] font-bold uppercase tracking-widest">{label}</span>
                </button>
            );

            return (
                <div className="app-shell">
                    {/* Header */}
                    <div className="px-6 pt-8 pb-4 flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-extrabold text-[#5F6F52] uppercase tracking-[0.2em]">Мамин Помощник</p>
                            <h1 className="text-2xl font-extrabold text-[#3E4B34]">Чистая Голова</h1>
                        </div>
                        <div className="w-10 h-10 rounded-full bg-[#A9B388]/20 flex items-center justify-center">🌿</div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-6 pb-32 custom-scroll">
                        {view === 'home' && (
                            <div className="animate-in space-y-8">
                                <div className="olive-grad p-8 rounded-[32px] text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-light">Привет, <span className="font-extrabold">Мам!</span></h2>
                                        <p className="mt-2 text-white/70 text-sm">Готова навести порядок в мыслях?</p>
                                        <button 
                                            onClick={() => setView('input')}
                                            className="mt-6 px-6 py-3 bg-[#FEFAE0] text-[#3E4B34] rounded-2xl font-bold text-sm"
                                        >
                                            Начать разгрузку
                                        </button>
                                    </div>
                                    <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div onClick={() => setView('planner')} className="card-glass p-6 border-b-4 border-[#B99470] cursor-pointer active:scale-95 transition-all">
                                        <div className="text-2xl mb-2">🗓️</div>
                                        <p className="font-extrabold text-xs uppercase tracking-tighter">Планы</p>
                                    </div>
                                    <div onClick={() => setView('history')} className="card-glass p-6 border-b-4 border-[#5F6F52] cursor-pointer active:scale-95 transition-all">
                                        <div className="text-2xl mb-2">📔</div>
                                        <p className="font-extrabold text-xs uppercase tracking-tighter">Проекты</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'input' && (
                            <div className="animate-in space-y-6">
                                <h2 className="text-xl font-extrabold text-[#3E4B34]">Новая выгрузка</h2>
                                <textarea 
                                    className="w-full h-80 p-8 rounded-[32px] card-glass outline-none focus:ring-2 ring-[#5F6F52] transition-all resize-none text-lg shadow-inner"
                                    placeholder="Просто пиши всё подряд: от молока до глобальных планов..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                />
                                <button 
                                    onClick={handleProcess}
                                    disabled={loading}
                                    className="w-full py-5 olive-grad text-white rounded-[24px] font-extrabold shadow-xl disabled:opacity-50 active:scale-95 transition-all"
                                >
                                    {loading ? 'ИИ РАБОТАЕТ...' : 'ПРЕВРАТИТЬ В ПЛАН'}
                                </button>
                            </div>
                        )}

                        {view === 'planner' && (
                            <div className="animate-in space-y-6">
                                <div className="flex bg-gray-100 p-1 rounded-2xl">
                                    {['day', 'month', 'year'].map(t => (
                                        <button 
                                            key={t}
                                            onClick={() => setPlanType(t)}
                                            className={`flex-1 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all ${planType === t ? 'bg-white shadow-sm text-[#5F6F52]' : 'text-gray-400'}`}
                                        >
                                            {t === 'day' ? 'День' : t === 'month' ? 'Месяц' : 'Год'}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="card-glass p-8 min-h-[400px]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-lg font-extrabold text-[#3E4B34]">
                                            {planType === 'day' ? 'Сегодня' : planType === 'month' ? 'Март 2024' : 'Цели на 2024'}
                                        </h3>
                                        <span className="text-[10px] font-bold text-[#B99470]">0 / 5 готово</span>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="p-4 bg-white/50 rounded-2xl border-l-4 border-[#B99470] flex items-center space-x-3">
                                            <div className="w-5 h-5 border-2 border-[#B99470] rounded-md"></div>
                                            <p className="text-sm font-medium">Тут будут твои задачи из архива...</p>
                                        </div>
                                        <button className="w-full py-4 border-2 border-dashed border-gray-300 rounded-2xl text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                                            + Добавить вручную
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="animate-in space-y-6 pb-10">
                                <h2 className="text-xl font-extrabold uppercase">Архив Проектов</h2>
                                {tasks.length === 0 && <p className="text-center py-20 text-gray-400 italic">Пока пусто...</p>}
                                {tasks.map(task => (
                                    <div key={task.id} className="card-glass p-6 border-t-4 border-[#5F6F52] shadow-md space-y-4">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-black text-[#5F6F52] bg-[#5F6F52]/10 px-3 py-1 rounded-full uppercase italic">{task.date}</span>
                                            <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))} className="text-red-300">✕</button>
                                        </div>
                                        <div className="p-3 bg-gray-50/50 rounded-xl text-[10px] italic text-gray-400 border-l-2 border-gray-200">
                                            «{task.raw.substring(0, 80)}...»
                                        </div>
                                        <div className="text-sm leading-relaxed text-[#3E4B34] whitespace-pre-wrap font-medium">
                                            {task.analysis}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Navigation */}
                    <div className="absolute bottom-0 left-0 right-0 h-28 nav-blur px-8 flex items-center justify-between pb-6">
                        <NavButton id="home" icon={
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        } label="Главная" />
                        
                        <NavButton id="planner" icon={
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        } label="Планы" />

                        <div onClick={() => setView('input')} className="transform -translate-y-8 bg-[#5F6F52] p-5 rounded-[2rem] text-white shadow-2xl active:scale-90 transition-all cursor-pointer border-4 border-[#fcfbf4]">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 4v16m8-8H4"/></svg>
                        </div>

                        <NavButton id="history" icon={
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                        } label="Архив" />
                        
                        <NavButton id="settings" icon={
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        } label="Профиль" />
                    </div>

                    {loading && (
                        <div className="absolute inset-0 z-[100] bg-[#fcfbf4]/90 backdrop-blur-sm flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-[#5F6F52] border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-6 text-xs font-black uppercase tracking-[0.3em] text-[#5F6F52]">ИИ создает порядок...</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
