<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чистая Голова | AI Assistant</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #fcfbf4; 
            margin: 0; 
            overscroll-behavior: none;
        }
        .olive-grad { background: linear-gradient(135deg, #5F6F52 0%, #3E4B34 100%); }
        .card-glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 24px; 
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .loading-dots:after { content: '.'; animation: dots 1s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('mama_app_tasks');
                return saved ? JSON.parse(saved) : [];
            });

            // Ключ API для работы вне песочницы (пустой для безопасности)
            const apiKey = ""; 

            useEffect(() => {
                localStorage.setItem('mama_app_tasks', JSON.stringify(tasks));
            }, [tasks]);

            const callAI = async (textPrompt, imageData = null) => {
                if (!textPrompt && !imageData) return;
                setLoading(true);

                const systemPrompt = "Ты помощник для мам. Разбери хаос в тексте на категории: Срочно, Дети, Быт. Напиши кратко и с поддержкой.";
                
                // ВАЖНО: Если запускаешь локально, нужен свой ключ Gemini API
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: `${systemPrompt}\n\nПользователь пишет: ${textPrompt}` },
                            ...(imageData ? [{ inlineData: { mimeType: "image/png", data: imageData } }] : [])
                        ]
                    }]
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('Ошибка API');
                    
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Не удалось разобрать текст.";

                    const newTask = {
                        id: Date.now(),
                        content: aiText,
                        raw: textPrompt || "Анализ фото",
                        date: new Date().toLocaleDateString('ru-RU')
                    };

                    setTasks([newTask, ...tasks]);
                    setView('history');
                    setInput('');
                } catch (err) {
                    console.error(err);
                    alert("Ошибка: Не удалось связаться с ИИ. Если вы запускаете это на Vercel, убедитесь, что в коде указан API Key.");
                } finally {
                    setLoading(false);
                }
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => callAI("", reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-[#fcfbf4] relative shadow-xl">
                    <header className="p-6 flex justify-between items-center">
                        <h1 className="font-extrabold text-xl text-[#3E4B34] flex items-center">
                            <span className="mr-2">🌿</span> Чистая Голова
                        </h1>
                        <button onClick={() => setView('history')} className="text-xs font-bold bg-[#5F6F52]/10 text-[#5F6F52] px-4 py-2 rounded-full">Архив</button>
                    </header>

                    <main className="flex-1 px-6 pb-24">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="olive-grad p-8 rounded-[32px] text-white shadow-lg">
                                    <p className="text-white/80 text-sm mb-1">Сегодня {new Date().toLocaleDateString('ru-RU')}</p>
                                    <h2 className="text-2xl font-bold">Выгрузи мысли, <br/>чтобы отдохнуть.</h2>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setView('input')} className="card-glass p-6 text-center hover:bg-white transition-colors">
                                        <div className="text-3xl mb-2">✍️</div>
                                        <div className="font-bold text-[#3E4B34]">Текст</div>
                                    </button>
                                    <label className="card-glass p-6 text-center cursor-pointer hover:bg-white transition-colors">
                                        <input type="file" accept="image/*" className="hidden" onChange={handlePhoto} />
                                        <div className="text-3xl mb-2">📷</div>
                                        <div className="font-bold text-[#3E4B34]">Фото</div>
                                    </label>
                                </div>
                            </div>
                        )}

                        {view === 'input' && (
                            <div className="space-y-4">
                                <textarea 
                                    className="w-full h-64 p-6 rounded-3xl card-glass border-0 focus:ring-2 focus:ring-[#5F6F52] text-lg outline-none"
                                    placeholder="Напиши всё, что крутится в голове..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                />
                                <div className="flex space-x-2">
                                    <button onClick={() => setView('home')} className="flex-1 py-4 bg-gray-200 rounded-2xl font-bold text-gray-500">Назад</button>
                                    <button onClick={() => callAI(input)} className="flex-[2] py-4 olive-grad text-white rounded-2xl font-bold">РАЗОБРАТЬ</button>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4">
                                {tasks.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400 italic">Тут пока пусто...</div>
                                ) : (
                                    tasks.map(t => (
                                        <div key={t.id} className="card-glass p-6 border-l-4 border-[#5F6F52]">
                                            <div className="text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">{t.date}</div>
                                            <div className="text-[#3E4B34] whitespace-pre-wrap leading-relaxed">{t.content}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {loading && (
                        <div className="fixed inset-0 bg-[#fcfbf4]/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                            <div className="text-4xl animate-bounce">🧘‍♀️</div>
                            <div className="mt-4 font-bold text-[#3E4B34] loading-dots text-xl">Наводим порядок</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
