<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чистая Голова PRO</title>
    <!-- Библиотеки для работы приложения -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F7F3EF; margin: 0; padding: 0; overflow: hidden; }
        .olive-gradient { background: linear-gradient(135deg, #708238 0%, #4F6F52 100%); }
        .pink-soft { background-color: #FADADD; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .app-shell { width: 100%; max-width: 410px; height: 100vh; background: #F7F3EF; position: relative; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        @media (min-width: 450px) { .app-shell { height: 850px; border: 12px solid #3A4D39; border-radius: 3.5rem; margin-top: 20px; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #708238; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [page, setPage] = useState(0);
            const [loading, setLoading] = useState(false);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('tasks-mom') || '[]'));
            const [textInput, setTextInput] = useState("");

            useEffect(() => {
                localStorage.setItem('tasks-mom', JSON.stringify(history));
            }, [history]);

            const callAI = async (text, system) => {
                setLoading(true);
                // ВАЖНО: Ключ уже встроен
                const KEY = "AIzaSyADDsc1do-rBRzPzTKgjKMkd8a1-43kDiw"; 
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: system }] }
                        })
                    });
                    const data = await response.json();
                    setLoading(false);
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка анализа";
                } catch (e) {
                    setLoading(false);
                    return "Ошибка сети. Попробуй позже.";
                }
            };

            const handleAnalyze = async () => {
                if (!textInput.trim()) return;
                const prompt = textInput;
                const result = await callAI(prompt, "Ты эмпатичный ассистент для мам. Разложи хаос на Срочное, Дети, Быт и Личное. Используй эмодзи.");
                setHistory([{ id: Date.now(), input: prompt, output: result }, ...history]);
                setTextInput("");
                setPage(2); // Переход в историю
            };

            const deleteItem = (id) => setHistory(history.filter(h => h.id !== id));

            return (
                <div className="flex items-center justify-center min-h-screen">
                    <div className="app-shell overflow-hidden">
                        
                        {/* Загрузка */}
                        {loading && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/70 backdrop-blur-md">
                                <div className="w-12 h-12 border-4 border-[#708238] border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-xs font-bold text-[#708238] tracking-widest uppercase">Магия в процессе...</p>
                            </div>
                        )}

                        {/* Контент */}
                        <div className="flex-1 overflow-y-auto px-6 pt-12 pb-24 custom-scroll">
                            {page === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-center space-y-8 animate-in fade-in duration-700">
                                    <div className="w-28 h-28 olive-gradient rounded-[2.5rem] flex items-center justify-center shadow-2xl">
                                        <span className="text-5xl">🌿</span>
                                    </div>
                                    <div>
                                        <h1 className="text-4xl font-black text-[#3A4D39] leading-none uppercase">ЧИСТАЯ<br/>ГОЛОВА</h1>
                                        <p className="mt-2 text-[10px] tracking-[0.3em] opacity-40 uppercase font-bold text-[#3A4D39]">Твой уютный оазис</p>
                                    </div>
                                    <button onClick={() => setPage(1)} className="w-full py-5 olive-gradient text-white rounded-[2rem] font-bold shadow-xl active:scale-95 transition-all">
                                        ВЫГРУЗИТЬ ХАОС
                                    </button>
                                </div>
                            )}

                            {page === 1 && (
                                <div className="space-y-6 animate-in slide-in-from-bottom-10">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 pink-soft rounded-2xl flex items-center justify-center text-xl">✨</div>
                                        <h2 className="text-2xl font-black text-[#3A4D39]">Выгрузка</h2>
                                    </div>
                                    <div className="glass p-6 rounded-[2.5rem] shadow-inner">
                                        <textarea 
                                            value={textInput}
                                            onChange={e => setTextInput(e.target.value)}
                                            placeholder="Что сейчас в голове? (поликлиника, купить хлеб, усталость...)"
                                            className="w-full h-48 bg-transparent border-none outline-none text-sm leading-relaxed placeholder:text-[#3A4D39]/30 resize-none font-medium"
                                        />
                                    </div>
                                    <button onClick={handleAnalyze} className="w-full py-5 olive-gradient text-white rounded-[2rem] font-bold shadow-2xl">
                                        РАСПУТАТЬ МЫСЛИ
                                    </button>
                                </div>
                            )}

                            {page === 2 && (
                                <div className="space-y-6 animate-in fade-in">
                                    <h2 className="text-2xl font-black text-[#3A4D39]">Архив спокойствия</h2>
                                    {history.length === 0 && <p className="text-center opacity-30 italic py-10">Тут пока пусто...</p>}
                                    {history.map(item => (
                                        <div key={item.id} className="p-6 rounded-[2.5rem] glass border-l-8 border-[#708238] shadow-sm relative mb-4">
                                            <button onClick={() => deleteItem(item.id)} className="absolute top-4 right-4 text-red-300">✕</button>
                                            <p className="text-xs font-bold mb-3 opacity-60 italic">"{item.input}"</p>
                                            <div className="text-[11px] leading-relaxed text-[#3A4D39] whitespace-pre-wrap font-medium">
                                                {item.output}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Навигация */}
                        <div className="absolute bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t flex items-center justify-around px-8 pb-4">
                            <button onClick={() => setPage(0)} className={`p-4 rounded-2xl transition-all ${page === 0 ? 'olive-gradient text-white shadow-lg' : 'text-[#3A4D39]/20'}`}>🏠</button>
                            <button onClick={() => setPage(1)} className={`p-4 rounded-2xl transition-all ${page === 1 ? 'olive-gradient text-white shadow-lg' : 'text-[#3A4D39]/20'}`}>📝</button>
                            <button onClick={() => setPage(2)} className={`p-4 rounded-2xl transition-all ${page === 2 ? 'olive-gradient text-white shadow-lg' : 'text-[#3A4D39]/20'}`}>📚</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
